<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino Tasarım Merkezi Pro</title>
    <!-- CSS dosyasının ismi tam olarak 'style.css' olmalı -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">ARDUINO TASARIM MERKEZİ</div>
            <div class="search-box">
                <input type="text" id="partSearch" placeholder="Parça ara..." onkeyup="searchParts()">
            </div>
            <h3>MALZEME ENVANTERİ</h3>
            <div id="inventory-list" class="inventory-grid"></div>
        </aside>

        <main class="workbench">
            <div class="hud-display">
                <div class="status-panel">
                    <div>SİSTEM: <span class="neon-text">HAZIR</span></div>
                    <div>MASADAKİ PARÇA: <span id="part-count">0</span></div>
                </div>
            </div>
            <div id="table-canvas" class="grid-table">
                <div class="watermark">SANAL ROBOTİK TASARIM ALANI</div>
            </div>
        </main>
    </div>

    <!-- JS dosyasının ismi tam olarak 'script.js' olmalı -->
    <script src="script.js"></script>
</body>
</html>
